name: Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  standardrb:
    name: standardrb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - run: bundle exec standardrb --format progress
